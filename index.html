<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ミリオンゴッド シミュレーター</title>
<style>
:root {
  --bg: #1c1c2e;
  --card: #252540;
  --card2: #1e1e30;
  --red: #ff3355;
  --yellow: #ccaa00;
  --orange: #ff8800;
  --gold: #ffd700;
  --text: #ffffff;
  --dim: #6c757d;
  --border: #333355;
}
/* Z-ZONE：黒金ベース */
body.z-active {
  --bg:    #1c1800;
  --card:  #272100;
  --card2: #1f1a00;
  --border: #3d3500;
  --dim:   #8a7d40;
}
body.z-active #app {
  box-shadow: 0 0 40px rgba(255,210,0,0.12);
}

/* Z-GAME：黄色全開 */
body.z-game-active {
  --bg:    #3a2c00;
  --card:  #4e3c00;
  --card2: #402f00;
  --border: #7a6000;
  --dim:   #c8a040;
}
body.z-game-active #app {
  box-shadow: 0 0 80px rgba(255,204,0,0.55), 0 0 160px rgba(255,180,0,0.25);
  border: 1px solid rgba(255,204,0,0.25);
  border-radius: 20px;
}
/* 全体に薄黄色オーバーレイ */
#z-game-tint {
  position: fixed; inset: 0;
  background: rgba(255,200,0,0.07);
  pointer-events: none; z-index: 10; display: none;
}
body.z-game-active #z-game-tint { display: block; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px 12px;
}
#app { width: 100%; max-width: 390px; }
.game-title { text-align: center; padding: 8px; margin-bottom: 12px; }
.game-title h1 { font-size: 20px; font-weight: 900; letter-spacing: 5px; }
.game-title .sub { font-size: 10px; color: var(--dim); letter-spacing: 3px; margin-top: 2px; }
.reel-area { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
.sword-icon {
  text-align: center; height: 0; overflow: hidden; opacity: 0;
  transition: height 0.3s, opacity 0.3s; margin-bottom: 0;
}
.sword-icon.visible { height: 40px; opacity: 1; margin-bottom: 6px; }
.reels { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
.reel {
  background: var(--card2); border-radius: 10px; width: 88px; height: 96px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--border); transition: border-color 0.2s, background 0.2s;
}
.reel-digit { font-size: 58px; font-weight: 900; line-height: 1; color: var(--dim); }
.reel.s-odd { border-color: var(--red); background: #2a1020; }
.reel.s-odd .reel-digit { color: var(--red); text-shadow: 0 0 18px var(--red); }
.reel.s-even { border-color: #4a4a6a; }
.reel.s-even .reel-digit { color: var(--yellow); }
.reel.s-zero { border-color: #aa0000; background: #200000; }
.reel.s-zero .reel-digit { color: #cc0000; text-shadow: 0 0 14px #cc0000; }
.reel.s-seven { border-color: #9900cc; background: #08001a; }
.reel.s-seven .reel-digit {
  background: linear-gradient(180deg,#ff8800,#ffff00,#00ff88,#0088ff,#ff0088);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 8px #ff0088);
}
.reel.s-v .reel-digit { color: var(--red); font-style: italic; }
.reel.s-tenpa { border-color: var(--orange); }
.reel.s-tenpa .reel-digit,
.reel.s-hot .reel-digit { color: var(--orange); text-shadow: 0 0 12px var(--orange); }
.reel-area.s-pinch { border: 2px solid var(--orange); box-shadow: 0 0 20px rgba(255,136,0,0.3); }

/* Z-ZONE/Z-GAME モード：リール非表示＋剣を大きく黄色表示 */
.reel-area.z-mode .reels      { display: none; }
.reel-area.z-mode .reel-message { display: none; }
.reel-area.z-mode .sword-icon {
  height: 110px; opacity: 1; overflow: visible;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 0;
}
.reel-area.z-mode .sword-icon svg { width: 54px; height: 66px; }
.reel-area.z-mode .sword-icon svg line   { stroke: #ffcc00 !important; }
.reel-area.z-mode .sword-icon svg polygon { fill: #ffcc00 !important; }
.god-labels {
  display: flex; justify-content: space-around;
  margin-top: 2px; height: 0; overflow: hidden; opacity: 0;
  transition: height 0.3s, opacity 0.3s;
}
.god-labels.visible { height: 20px; opacity: 1; }
.god-label { font-size: 13px; font-weight: 900; }
.reel-message {
  text-align: center; font-size: 12px; font-weight: bold;
  letter-spacing: 1px; min-height: 20px; margin-top: 8px; color: var(--dim);
}
.role-display {
  display: flex; gap: 8px; margin-bottom: 10px;
}
.role-box {
  flex: 1; background: var(--card); border-radius: 8px;
  padding: 8px 10px; text-align: center;
  font-size: 13px; color: #aaa;
}
#role-rate { color: var(--dim); }
.counters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.counter-sub { font-size: 10px; margin-top: 3px; min-height: 14px; }
.counter { background: var(--card); border-radius: 10px; padding: 10px 8px; text-align: center; }
.counter-label { font-size: 10px; color: var(--dim); margin-bottom: 4px; }
.counter-value { font-size: 24px; font-weight: bold; }
.counter-value.guarantee { color: var(--orange); }
.counter-value.guarantee.low { color: var(--red); }
.counter-value.replay { color: #4da6ff; }
.counter-value.yellow7 { color: var(--gold); }
.btn-lever {
  width: 100%; background: var(--red); border: none; border-radius: 12px;
  padding: 16px; color: #fff; font-size: 16px; font-weight: 900; cursor: pointer;
  margin-bottom: 8px; transition: opacity 0.15s, transform 0.1s;
}
.btn-lever:active { transform: scale(0.98); }
.btn-lever:disabled { background: #444; color: #666; cursor: not-allowed; }
.btn-reset {
  width: 100%; background: transparent; border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; color: var(--dim); font-size: 12px; cursor: pointer;
}
.btn-reset:hover { border-color: #666; color: #aaa; }
@keyframes reelDrop {
  0%   { transform: translateY(-24px); opacity: 0; }
  65%  { transform: translateY(4px); }
  100% { transform: translateY(0); opacity: 1; }
}
@keyframes reelPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}
@keyframes flashRed    { 0% { background: rgba(255,51,85,0.55); } 100% { background: transparent; } }
@keyframes flashOrange { 0% { background: rgba(255,136,0,0.45); } 100% { background: transparent; } }
@keyframes flashZGame  {
  0%   { background: rgba(255,220,0,0.96); }
  18%  { background: rgba(255,220,0,0.55); }
  38%  { background: rgba(255,220,0,0.88); }
  62%  { background: rgba(255,220,0,0.40); }
  100% { background: transparent; }
}
.reel.anim-drop { animation: reelDrop 0.35s ease-out; }
.reel.anim-pop  { animation: reelPop  0.3s ease-out; }
/* ブラックアウト（GOD揃い用） */
#blackout {
  position: fixed; inset: 0; z-index: 260;
  background: #000; opacity: 0; pointer-events: none;
  transition: opacity 0.08s ease-in;
}
#blackout.active { opacity: 1; pointer-events: all; }

/* Z-GAME 突入カットシーン */
#zgame-cutscene {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.92);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s ease-in;
}
#zgame-cutscene.visible {
  opacity: 1; pointer-events: all;
  transition: opacity 0.15s ease-in;
}
#zgame-cutscene.fade-out {
  opacity: 0;
  transition: opacity 0.3s ease-out;
}
#zgame-cutscene img {
  width: 85%; max-width: 370px;
  filter: drop-shadow(0 0 24px rgba(255,204,0,0.9)) drop-shadow(0 0 8px rgba(255,204,0,0.6));
}
.overlay { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
.overlay.flash-red    { animation: flashRed    0.5s ease-out forwards; }
.overlay.flash-orange { animation: flashOrange 0.4s ease-out forwards; }
.overlay.flash-zgame  { animation: flashZGame  1.1s ease-out forwards; }
.end-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; pointer-events: none; transition: background 0.6s;
}
.end-overlay.visible { background: rgba(0,0,0,0.88); pointer-events: all; }
.end-overlay .end-text {
  font-size: 32px; font-weight: 900; color: var(--dim); letter-spacing: 5px;
  opacity: 0; transition: opacity 0.4s 0.3s;
}
.end-overlay.visible .end-text { opacity: 1; }
.end-overlay .end-sub {
  font-size: 13px; color: #555; margin-top: 10px;
  opacity: 0; transition: opacity 0.4s 0.5s;
}
.end-overlay.visible .end-sub { opacity: 1; }
.btn-back {
  margin-top: 28px; padding: 12px 36px;
  background: transparent; border: 1px solid #555;
  border-radius: 8px; color: #888; font-size: 14px; cursor: pointer;
  opacity: 0; transition: opacity 0.4s 0.7s;
}
.btn-back:hover { border-color: #aaa; color: #ccc; }
.end-overlay.visible .btn-back { opacity: 1; }

/* ===== Z-ZONE / Z-GAME / RESULT ===== */
.z-panel { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 10px; text-align: center; }
.z-phase-title { font-size: 20px; font-weight: 900; letter-spacing: 4px; margin-bottom: 14px; }
.z-zone-color { color: #cc0000; text-shadow: 0 0 14px rgba(204,0,0,0.6); }
.z-game-color {
  background: linear-gradient(90deg,#ff8800,#ffcc00,#00ff88);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.z-coins-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 14px; }
.z-coin {
  width: 36px; height: 36px; border-radius: 50%;
  background: radial-gradient(circle at 38% 35%, #ffe97a, #c89000);
  border: 2px solid #ffcc00; box-shadow: 0 0 8px rgba(255,204,0,0.5);
  transition: opacity 0.3s, transform 0.3s;
}
.z-coin.spent { opacity: 0.12; transform: scale(0.8); box-shadow: none; }
.z-chain-line { font-size: 22px; font-weight: 900; color: #ffcc00; min-height: 30px; margin-bottom: 8px; }
.z-info-row { font-size: 12px; color: var(--dim); margin-bottom: 4px; }
.z-info-val { font-weight: bold; color: var(--text); }
.z-lottery-box { background: var(--card2); border-radius: 10px; padding: 12px; margin-top: 12px; text-align: left; }
.z-lottery-line { font-size: 12px; line-height: 2.0; }
.z-game-big {
  font-size: 52px; font-weight: 900; line-height: 1;
  background: linear-gradient(135deg,#ff8800,#ffcc00,#00ff88);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin: 8px 0;
}
.z-game-sub { font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
.z-game-streak { font-size: 14px; color: #ffcc00; min-height: 22px; }
.result-box { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 10px; }
.result-hdr { font-size: 16px; font-weight: 900; letter-spacing: 3px; color: var(--gold); text-align: center; margin-bottom: 14px; }
.result-row { display: flex; justify-content: space-between; padding: 6px 2px; border-bottom: 1px solid var(--border); font-size: 13px; }
.result-row:last-of-type { border-bottom: none; }
.result-row .rl { color: var(--dim); }
.result-row .rv { font-weight: bold; }
.result-sum { background: var(--card2); border-radius: 10px; padding: 14px; text-align: center; margin-top: 12px; }
.result-sum-num { font-size: 40px; font-weight: 900; color: var(--gold); text-shadow: 0 0 16px rgba(255,215,0,0.4); line-height: 1; }
.result-sum-unit { font-size: 14px; color: var(--dim); margin-top: 2px; }
.result-bns { font-size: 12px; color: var(--orange); margin-top: 6px; min-height: 18px; }
.result-detail { margin-top: 12px; font-size: 11px; color: var(--dim); line-height: 2; background: var(--card2); border-radius: 8px; padding: 10px; }

/* ===== 履歴 ===== */
.history-wrap { background: var(--card); border-radius: 12px; padding: 12px; margin-top: 8px; }
.history-title { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 8px; }
.history-item { font-size: 11px; padding: 5px 0; border-bottom: 1px solid var(--border); line-height: 1.7; }
.history-item:last-child { border-bottom: none; }
.h-fall  { color: #4da6ff; font-weight: bold; }
.h-gg    { color: var(--orange); font-weight: bold; }
.h-zzone { color: #cc0000; font-weight: bold; }
.h-n     { color: #444; }
.h-trig  { color: #666; font-size: 10px; }
.h-dig   { font-weight: 900; }

/* ===== ランキング ===== */
.ranking-wrap { background: var(--card); border-radius: 12px; padding: 12px; margin-top: 8px; }
.ranking-title { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 8px; }
.ranking-item { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.ranking-item:last-child { border-bottom: none; }
.r-rank   { width: 24px; font-weight: 900; font-size: 13px; flex-shrink: 0; }
.r-rank.gold   { color: #ffd700; }
.r-rank.silver { color: #c0c0c0; }
.r-rank.bronze { color: #cd7f32; }
.r-rank.other  { color: var(--dim); }
.r-coins  { flex: 1; font-weight: bold; color: var(--gold); text-align: right; }
.r-date   { color: #555; font-size: 10px; text-align: right; flex-shrink: 0; }
.ranking-empty { font-size: 11px; color: var(--dim); text-align: center; padding: 8px 0; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">
  <div class="game-title">
    <h1>MILLION GOD</h1>
    <div class="sub">ガイアステージ</div>
  </div>

  <div class="reel-area" id="reel-area">
    <div class="sword-icon" id="sword-icon">
      <svg width="28" height="34" viewBox="0 0 28 34" fill="none">
        <line x1="14" y1="1"  x2="14" y2="28" stroke="#cc0000" stroke-width="3"   stroke-linecap="round"/>
        <line x1="7"  y1="9"  x2="21" y2="9"  stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="9"  y1="13" x2="19" y2="13" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>
        <polygon points="14,33 10.5,26 17.5,26" fill="#cc0000"/>
      </svg>
    </div>

    <div class="reels">
      <div class="reel" id="reel-0"><span class="reel-digit">—</span></div>
      <div class="reel" id="reel-1"><span class="reel-digit">—</span></div>
      <div class="reel" id="reel-2"><span class="reel-digit">—</span></div>
    </div>

    <div class="god-labels" id="god-labels">
      <span class="god-label" style="background:linear-gradient(90deg,#ff8800,#ffff00);-webkit-background-clip:text;-webkit-text-fill-color:transparent">GOD</span>
      <span class="god-label" style="background:linear-gradient(90deg,#ffff00,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent">GOD</span>
      <span class="god-label" style="background:linear-gradient(90deg,#00ff88,#0088ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">GOD</span>
    </div>

    <div class="reel-message" id="reel-message"></div>
  </div>

  <div class="role-display" id="role-display">
    <div class="role-box" id="role-label">— 待機中 —</div>
    <div class="role-box" id="role-rate"></div>
  </div>

  <div class="counters">
    <div class="counter">
      <div class="counter-label">経過G数</div>
      <div class="counter-value" id="cnt-total">0</div>
    </div>
    <div class="counter">
      <div class="counter-label">保証G数</div>
      <div class="counter-value guarantee" id="cnt-guarantee">9</div>
      <div class="counter-sub" id="cnt-guarantee-sub"></div>
    </div>
    <div class="counter">
      <div class="counter-label">リプレイ連続</div>
      <div class="counter-value replay" id="cnt-replay">0</div>
      <div class="counter-sub" id="cnt-replay-sub"></div>
    </div>
    <div class="counter">
      <div class="counter-label">黄7連続</div>
      <div class="counter-value yellow7" id="cnt-yellow7">0</div>
      <div class="counter-sub" id="cnt-yellow7-sub"></div>
    </div>
  </div>

  <!-- Z-ZONE panel -->
  <div id="z-zone-panel" style="display:none;">
    <div class="z-panel">
      <div class="z-phase-title z-zone-color">— Z ZONE —</div>
      <div class="z-coins-row" id="z-coins-row">
        <div class="z-coin" id="z-coin-0"></div>
        <div class="z-coin" id="z-coin-1"></div>
        <div class="z-coin" id="z-coin-2"></div>
        <div class="z-coin" id="z-coin-3"></div>
        <div class="z-coin" id="z-coin-4"></div>
      </div>
      <div class="z-chain-line" id="z-chain-line"></div>
      <div class="z-info-row">獲得セット数：<span class="z-info-val" id="z-sets-disp">1</span></div>
      <div id="z-lottery-box" class="z-lottery-box" style="display:none;">
        <div class="z-lottery-line" id="z-lottery-log"></div>
      </div>
    </div>
  </div>

  <!-- Z-GAME panel -->
  <div id="z-game-panel" style="display:none;">
    <div class="z-panel">
      <div class="z-phase-title z-game-color">★ Z GAME ★</div>
      <div class="z-game-sub">獲得セット数</div>
      <div class="z-game-big" id="z-game-big">0</div>
      <div class="z-game-streak" id="z-game-streak"></div>
    </div>
  </div>

  <button class="btn-lever" id="btn-lever">レバーを叩く</button>
  <button class="btn-reset"  id="btn-reset">リセット</button>

  <!-- Result panel -->
  <div id="result-panel" style="display:none;">
    <div class="result-box">
      <div class="result-hdr">★ RESULT ★</div>
      <div id="result-rows"></div>
      <div class="result-sum">
        <div style="font-size:11px;color:var(--dim);margin-bottom:4px;">合計獲得枚数</div>
        <div class="result-sum-num" id="result-total">0</div>
        <div class="result-sum-unit">枚</div>
        <div class="result-bns" id="result-bns"></div>
      </div>
      <div class="result-detail" id="result-detail"></div>
    </div>
  </div>

  <!-- 履歴パネル -->
  <div id="history-panel" style="display:none;">
    <div class="history-wrap">
      <div class="history-title">— 履歴 —</div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- ランキングパネル -->
  <div id="ranking-panel">
    <div class="ranking-wrap">
      <div class="ranking-title">— ランキング TOP5 —</div>
      <div id="ranking-list"><div class="ranking-empty">読み込み中...</div></div>
    </div>
  </div>
</div>

<div id="blackout"></div>
<div id="zgame-cutscene">
  <img src="画像/Z-GAME.png" alt="Z GAME">
</div>
<div id="z-game-tint"></div>
<div class="overlay" id="overlay"></div>
<div class="end-overlay" id="end-overlay">
  <div class="end-text">STAGE END</div>
  <div class="end-sub" id="end-sub">ガイアステージ終了</div>
  <button class="btn-back" id="btn-back">戻る</button>
</div>

<script>
// ========== CONSTANTS ==========
const ROLE_TABLE = [
  { key: 'hazure_oshi',    label: 'はずれ①',    weight: 1/1.7,    den: 1.7    },
  { key: 'hazure_normal',  label: 'はずれ②',    weight: 1/5.2,    den: 5.2    },
  { key: 'replay_top',     label: '上段リプレイ', weight: 1/7.9,    den: 7.9    },
  { key: 'yellow7_bottom', label: '下段黄7',     weight: 1/18.4,   den: 18.4   },
  { key: 'gaia_bell',      label: 'ガイアベル',  weight: 1/37.6,   den: 37.6   },
  { key: 'replay_mid',     label: '中段リプレイ', weight: 1/109.2,  den: 109.2  },
  { key: 'yellow7_up',     label: '右上がり黄7', weight: 1/186.2,  den: 186.2  },
  { key: 'fake_replay',    label: '赤7フェイク', weight: 1/936.2,  den: 936.2  },
  { key: 'yellow7_mid',    label: '中段黄7',    weight: 1/963.8,  den: 963.8  },
  { key: 'red7_suroe',     label: '赤7揃い',    weight: 1/6900,   den: 6900   },
  { key: 'god_suroe',      label: 'GOD揃い',    weight: 1/16384,  den: 16384  },
  { key: 'sp_role',        label: 'SP役',       weight: 1/65536,  den: 65536  },
];
const ROLE_TOTAL_WEIGHT = ROLE_TABLE.reduce((s, r) => s + r.weight, 0);

// N連続確率計算（リプレイ・黄7それぞれの連続到達確率）
const REPLAY_CHAIN_P = (() => {

let history = [];

function pushHistory(outcome, extra) {
  // extra: { sets, coins, zGame } (optional)
  history.unshift({
    games:   gameState.totalGames,
    outcome,
    trigger: gameState.ggTrigger ?? null,
    digits:  gameState.ggDigits ? gameState.ggDigits.join('') : null,
    sets:    extra?.sets  ?? null,
    coins:   extra?.coins ?? null,
    zGame:   extra?.zGame ?? false,
  });
  if (history.length > 7) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) return;
  document.getElementById('history-panel').style.display = '';
  document.getElementById('history-list').innerHTML = history.map((e, i) => {
    let outcomeHtml;

    if (e.outcome === 'fall') {
      outcomeHtml = '<span class="h-fall">転落</span>';

    } else if (e.outcome === 'gg') {
      const digColor = e.digits === '777' ? '#ff8800' : 'var(--orange)';
      outcomeHtml  = '<span class="h-gg">GG当選</span>';
      if (e.trigger) outcomeHtml += '&nbsp;<span class="h-trig">' + e.trigger + '</span>';
      if (e.digits)  outcomeHtml += '&nbsp;<span class="h-dig" style="color:' + digColor + '">' + e.digits + '</span>';
      if (e.sets  != null) outcomeHtml += '<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="h-trig">→ ' + e.sets + 'セット　' + e.coins + '枚獲得</span>';

    } else {
      // zzone
      outcomeHtml  = '<span class="h-zzone">Zゾーン突入</span>';
      if (e.trigger) outcomeHtml += '&nbsp;<span class="h-trig">' + e.trigger + '</span>';
      outcomeHtml += '&nbsp;<span class="h-dig" style="color:#cc0000">000</span>';
      if (e.zGame) outcomeHtml += '<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="h-trig">→ Zゲーム突入</span>';
      if (e.sets  != null) outcomeHtml += '&nbsp;&nbsp;<span class="h-trig">' + e.sets + 'セット　' + e.coins + '枚獲得</span>';

    return '<div class="history-item">' +
      '<span class="h-n">' + (i + 1) + '回前：</span>' +
      e.games + 'G&nbsp;&nbsp;' + outcomeHtml +

}

function rollRole() {
  return weightedPick(ROLE_TABLE, ROLE_TOTAL_WEIGHT);
}

function updateChains(roleKey) {
  const replaySet  = new Set(['replay_top','replay_mid']);
  const yellow7Set = new Set(['yellow7_bottom','yellow7_up','yellow7_mid']);
  if (replaySet.has(roleKey)) {
    gameState.replayChain++;
    gameState.yellow7Chain = 0;
  } else if (yellow7Set.has(roleKey)) {
    gameState.yellow7Chain++;
    gameState.replayChain = 0;
  } else if (roleKey === 'gaia_bell') {
    gameState.replayChain++;
    gameState.yellow7Chain++;
  } else {
    gameState.replayChain  = 0;
    gameState.yellow7Chain = 0;
  }
}

// ========== UTILITY + バラケ目 ==========

function weightedPick(table, totalWeight) {
  const r = Math.random() * totalWeight;
  let cum = 0;
  for (const row of table) {
    cum += row.weight;
    if (r < cum) return row;
  }
  return table[table.length - 1];
}

function generateBarakeme(mode) {
  const BASE = ['0','1','2','3','4','5','6','8'];
  let result = null;
  for (let tries = 0; tries < 500 && !result; tries++) {
    const d = [
      BASE[Math.floor(Math.random() * BASE.length)],
      BASE[Math.floor(Math.random() * BASE.length)],
      BASE[Math.floor(Math.random() * BASE.length)],
    ];
    if (mode === 'hot') {
      d[Math.floor(Math.random() * 3)] = Math.random() < 0.5 ? '7' : 'V';
    }
    if (d[0] === d[1] && d[1] === d[2]) continue;
    if (FORBIDDEN_BARAKEME.has(d.join(''))) continue;
    const OZ = new Set(['0','1','3','5']);
    if (d[0] === d[1] && OZ.has(d[0])) continue;
    if (d[0] === d[2] && OZ.has(d[0]) && OZ.has(d[1])) continue;
    const EVEN_SET = new Set(['2','4','6','8']);
    if ((OZ.has(d[0]) || d[0] === 'V') && d[1] === d[2] && !EVEN_SET.has(d[1])) continue;
    const n = d.map(x => (x === 'V') ? NaN : Number(x));
    if (n[1] - n[0] === 1 && n[2] - n[1] === 1) continue;
    result = d;
  }
  return result || ['8','2','6'];
}

function generateTenpa(targetDigit) {
  const BASE     = ['0','1','2','3','4','5','6','8'];
  const diffPool = BASE.filter(d => d !== targetDigit);
  let result = null;
  for (let tries = 0; tries < 300 && !result; tries++) {
    const diff = diffPool[Math.floor(Math.random() * diffPool.length)];
    const d = [targetDigit, targetDigit, diff];
    if (FORBIDDEN_BARAKEME.has(d.join(''))) continue;
    result = d;
  }
  if (!result) {
    for (const diff of diffPool) {
      if (!FORBIDDEN_BARAKEME.has(targetDigit + targetDigit + diff)) {
        result = [targetDigit, targetDigit, diff];
        break;
      }
    }
    result = result || [targetDigit, targetDigit, diffPool[0]];
  }
  return result;
}

function getChokkouDisplay(chokkouTarget) {
  // 前兆中は常に奇数テンパイ（0テンパイなし）
  const displayTarget = chokkouTarget === '0'
    ? ['1','3','5'][Math.floor(Math.random() * 3)]
    : chokkouTarget;
  return { tenpa: generateTenpa(displayTarget), target: displayTarget };
}

// ========== LOTTERY FUNCTIONS ==========

function rollGGSingle(roleKey) {
  return Math.random() < (GG_SINGLE_TABLE[roleKey] ?? 0);
}

function rollGGChain() {
  if (gameState.replayChain > 0) {
    const idx = Math.min(gameState.replayChain, REPLAY_CHAIN_RATE.length - 1);
    if (Math.random() < REPLAY_CHAIN_RATE[idx]) return 'replay';
  }
  if (gameState.yellow7Chain > 0) {
    const idx = Math.min(gameState.yellow7Chain, YELLOW7_CHAIN_RATE.length - 1);
    if (Math.random() < YELLOW7_CHAIN_RATE[idx]) return 'yellow7';
  }
  return null;
}

function buildGGTrigger(roleKey, singleWon, chainType) {
  if (singleWon) {
    const rate  = (GG_SINGLE_TABLE[roleKey] ?? 0) * 100;
    const label = ROLE_TABLE.find(r => r.key === roleKey)?.label ?? roleKey;
    return label + ' ' + rate.toFixed(1) + '% で当選';
  }
  if (chainType === 'replay') {
    const n   = gameState.replayChain;
    const idx = Math.min(n, REPLAY_CHAIN_RATE.length - 1);
    return 'リプレイ' + n + '連 ' + (REPLAY_CHAIN_RATE[idx] * 100).toFixed(1) + '% で当選';
  }
  if (chainType === 'yellow7') {
    const n   = gameState.yellow7Chain;
    const idx = Math.min(n, YELLOW7_CHAIN_RATE.length - 1);
    return '黄7 ' + n + '連 ' + (YELLOW7_CHAIN_RATE[idx] * 100).toFixed(1) + '% で当選';
  }
  return '';
}

function rollGuaranteeAdd(roleKey) {
  return Math.random() < (GUARANTEE_ADD_TABLE[roleKey] ?? 0);
}

function rollFall(roleKey) {
  return Math.random() < (FALL_RATE[roleKey] ?? 0);
}

function decideGGNumber(roleKey) {
  if (roleKey === 'god_suroe') {
    return { digits: ['7','7','7'], instant: true };
  }
  if (roleKey === 'red7_suroe') {
    const d = ['1','3','5'][Math.floor(Math.random() * 3)];
    return { digits: [d, d, d], instant: true };
  }
  const d = Math.random() < 0.15
    ? '0'
    : ['1','3','5'][Math.floor(Math.random() * 3)];
  return { digits: [d, d, d], instant: false };
}

// ========== GAME FLOW ==========

function processGame() {
  if (gameState.phase === 'ended') return;

  if (gameState.pendingFall)     { endGaiaStage();       return; }
  if (gameState.pendingFakeFall) { showFakeRecovery();   return; }

  if (gameState.phase === 'chokkou') { processChokkouGame(); return; }
  if (gameState.phase === 'Z-ZONE')  { processZZoneGame();   return; }
  if (gameState.phase === 'Z-GAME')  { processZGameGame();   return; }
  if (gameState.phase === 'result')  { return; }

  // ===== GAIA フェーズ =====
  gameState.totalGames++;

  const role = rollRole();
  updateChains(role.key);

  const singleWon  = rollGGSingle(role.key);
  const chainResult = rollGGChain();
  const ggWon      = singleWon || !!chainResult;

  const isRare = ['yellow7_up','yellow7_mid','fake_replay','sp_role','red7_suroe'].includes(role.key);
  const isInstantRole = (role.key === 'god_suroe' || role.key === 'red7_suroe');

  const isRareForChokkou = ['replay_mid', 'yellow7_up'].includes(role.key);

  if (ggWon || isInstantRole) {
    const ggResult = decideGGNumber(role.key);
    gameState.ggDigits  = ggResult.digits;
    gameState.ggWins    = 1;
    gameState.ggTrigger = buildGGTrigger(role.key, singleWon, chainResult);

    if (ggResult.instant) {
      const instBonus = role.key === 'red7_suroe' ? 1400
                      : role.key === 'god_suroe'  ? 3000 : 0;
      gameState.bonusCoins = instBonus;
      gameState.phase      = 'gg_won';
      document.getElementById('btn-lever').disabled = true;

      const finishInstantGG = () => {
        renderReels(ggResult.digits, 'win');
        renderRole(role.key);
        updateCounters();
        showWinAnimation();
        pushHistory('gg', { sets: 1, coins: 350 + instBonus });
        showGGResultScreen();
      };

      if (role.key === 'god_suroe') {
        // 3秒ブラックアウト → 解除後に777表示
        document.getElementById('blackout').classList.add('active');
        setTimeout(() => {
          document.getElementById('blackout').classList.remove('active');
          finishInstantGG();
        }, 3000);
      } else {
        // 赤7揃い：リール表示後1秒フリーズ → 演出
        renderReels(ggResult.digits, 'win');
        renderRole(role.key);
        updateCounters();
        setTimeout(() => {
          showWinAnimation();
          pushHistory('gg', { sets: 1, coins: 350 + instBonus });
          showGGResultScreen();
        }, 1000);
      }
    } else {
      // GG当選でも保証G加算抽選は実施（減算なし）
      gameState.guaranteeAddPct = null;
      if (gameState.guaranteeGames <= 3 && rollGuaranteeAdd(role.key)) {
        const addRate = GUARANTEE_ADD_TABLE[role.key] ?? 0;
        gameState.guaranteeGames += 3;
        gameState.guaranteeAddPct = (addRate * 100).toFixed(1) + '%';
      }
      gameState.phase          = 'chokkou';
      gameState.chokkouCount   = 0;
      gameState.chokkouTarget  = ggResult.digits[0];
      gameState.chokkouRoleKey = role.key;
      const disp = getChokkouDisplay(gameState.chokkouTarget);
      renderReels(disp.tenpa, 'tenpa', disp.target);
      renderRole(role.key);
      updateCounters();
      showChokkouAnim();
    }
    return;
  }

  // ===== レア役ガセ前兆（GG非当選でも必ず前兆突入）=====
  if (isRareForChokkou) {
    // ガセ前兆突入時も保証G加算抽選を実施（減算なし）
    gameState.guaranteeAddPct = null;
    if (gameState.guaranteeGames <= 3 && rollGuaranteeAdd(role.key)) {
      const addRate = GUARANTEE_ADD_TABLE[role.key] ?? 0;
      gameState.guaranteeGames += 3;
      gameState.guaranteeAddPct = (addRate * 100).toFixed(1) + '%';
    }
    const fakeTarget = ['1','3','5'][Math.floor(Math.random() * 3)];
    gameState.ggWins         = 0;
    gameState.ggDigits       = null;
    gameState.phase          = 'chokkou';
    gameState.chokkouCount   = 0;
    gameState.chokkouTarget  = fakeTarget;
    gameState.chokkouRoleKey = role.key;
    const disp = getChokkouDisplay(fakeTarget);
    renderReels(disp.tenpa, 'tenpa', disp.target);
    renderRole(role.key);
    updateCounters();
    showChokkouAnim();
    return;
  }

  // ===== 5%ガセ前兆（一般役）=====
  const isGaseCandidate = ['hazure_oshi','hazure_normal','replay_top','yellow7_bottom','gaia_bell','fake_replay'].includes(role.key);
  if (isGaseCandidate && Math.random() < 0.05) {
    gameState.guaranteeAddPct = null;
    if (gameState.guaranteeGames <= 3 && rollGuaranteeAdd(role.key)) {
      const addRate = GUARANTEE_ADD_TABLE[role.key] ?? 0;
      gameState.guaranteeGames += 3;
      gameState.guaranteeAddPct = (addRate * 100).toFixed(1) + '%';
    }
    const fakeTarget = ['1','3','5'][Math.floor(Math.random() * 3)];
    gameState.ggWins         = 0;
    gameState.ggDigits       = null;
    gameState.phase          = 'chokkou';
    gameState.chokkouCount   = 0;
    gameState.chokkouTarget  = fakeTarget;
    gameState.chokkouRoleKey = role.key;
    const disp = getChokkouDisplay(fakeTarget);
    renderReels(disp.tenpa, 'tenpa', disp.target);
    renderRole(role.key);
    updateCounters();
    showChokkouAnim();
    return;
  }

  // ===== GG非当選 =====
  gameState.guaranteeAddPct = null;
  gameState.guaranteeGames  = Math.max(0, gameState.guaranteeGames - 1);

  if (gameState.guaranteeGames <= 3 && rollGuaranteeAdd(role.key)) {
    const addRate = GUARANTEE_ADD_TABLE[role.key] ?? 0;
    gameState.guaranteeGames    += 3;
    gameState.guaranteeAddPct    = (addRate * 100).toFixed(1) + '%';
  }

  let bDigits;
  if (role.key === 'fake_replay') {
    const t = ['1','3','5'][Math.floor(Math.random() * 3)];
    bDigits = generateTenpa(t);
  } else {
    bDigits = generateBarakeme(isRare ? 'hot' : 'normal');
  }
  renderReels(bDigits, 'normal');
  renderRole(role.key);
  updateCounters();

  if (gameState.guaranteeGames === 0) {
    const wEl = document.getElementById('reel-message');
    wEl.textContent = '12.9% で転落抽選中';
    wEl.style.color = 'var(--orange)';
  }

  if (gameState.guaranteeGames === 0) {
    if (rollFall(role.key)) {
      gameState.pendingFall = true;
      showFallPinch();
    } else if (Math.random() < 0.05) {
      gameState.pendingFakeFall = true;
      showFallPinch();
    }
  }
}

function processChokkouGame() {
  gameState.chokkouCount++;
  gameState.totalGames++;

  const role = rollRole();
  updateChains(role.key);

  // 保証G数減算（前兆中も実施）
  gameState.guaranteeAddPct = null;
  gameState.guaranteeGames  = Math.max(0, gameState.guaranteeGames - 1);
  if (gameState.guaranteeGames <= 3 && rollGuaranteeAdd(role.key)) {
    const addRate = GUARANTEE_ADD_TABLE[role.key] ?? 0;
    gameState.guaranteeGames += 3;
    gameState.guaranteeAddPct = (addRate * 100).toFixed(1) + '%';
  }

  // GG抽選（単発・チェーン両方）
  const singleWon   = rollGGSingle(role.key);
  const chainResult = rollGGChain();
  if (singleWon || chainResult) {
    if (gameState.ggWins === 0) {
      // 初当選 → 数字決定・契機保存
      const ggResult = decideGGNumber(role.key);
      gameState.ggDigits      = ggResult.digits;
      gameState.ggWins        = 1;
      gameState.chokkouTarget = ggResult.digits[0];
      gameState.ggTrigger     = buildGGTrigger(role.key, singleWon, chainResult);
    } else {
      gameState.ggWins++;
    }
  }

  // ガセ前兆判定（GG未当選の場合のみ）
  // 条件付き確率で 25/25/25% ガセ分布を実現
  if (gameState.ggWins === 0) {
    const gaseProb = gameState.chokkouCount === 1 ? 0.25
                   : gameState.chokkouCount === 2 ? 1 / 3
                   : 1.0; // 3ゲーム到達でGG未当選 → 必ずガセ
    if (Math.random() < gaseProb) {
      gameState.phase = 'gaia';
      const bDigits = generateBarakeme('normal');
      renderReels(bDigits, 'normal');
      renderRole(role.key);
      document.getElementById('reel-message').textContent = 'ガセ前兆';
      updateCounters();
      return;
    }
  }

  // 3ゲーム到達 かつ GG確定 → 当選告知
  if (gameState.chokkouCount >= 3 && gameState.ggWins > 0) {
    const isZero = gameState.ggDigits[0] === '0';
    renderReels(gameState.ggDigits, 'win');
    renderRole(role.key);
    updateCounters();
    showWinAnimation();
    if (isZero) {
      // 000 → Zゾーン突入
      initZZone();
    } else {
      gameState.bonusCoins = 0;
      gameState.phase = 'gg_won';
      pushHistory('gg', { sets: 1, coins: 350 });
      showGGResultScreen();
    }
    return;
  }

  // 前兆継続（テンパイ表示）
  const disp = getChokkouDisplay(gameState.chokkouTarget);
  renderReels(disp.tenpa, 'tenpa', disp.target);
  renderRole(role.key);
  updateCounters();
  showChokkouAnim();
}

function endGaiaStage() {
  gameState.phase = 'ended';
  pushHistory('fall');
  showFallEnd();
}

// ========== Z-ZONE / Z-GAME ==========

function rollZZoneRole() {
  return weightedPick(Z_ROLE_TABLE, Z_ROLE_TOTAL_WEIGHT);
}

function initZZone() {
  gameState.phase          = 'Z-ZONE';
  gameState.zZoneCoins     = 5;
  gameState.zZoneChain     = 0;
  gameState.zZoneHadYellow7 = false;
  gameState.zGameChain     = 0;
  gameState.totalSets      = 1;  // 突入で+1
  gameState.setFromEntry   = 1;
  gameState.setFromZZone   = 0;
  gameState.setFromZGame   = 0;
  gameState.setFromLottery = 0;
  gameState.bonusCoins     = 0;
  showZZonePanel();
}

function showZZonePanel() {
  document.body.classList.add('z-active');
  document.getElementById('z-zone-panel').style.display = '';
  document.getElementById('z-game-panel').style.display = 'none';
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('z-lottery-box').style.display = 'none';
  updateZCoinsDisplay();
  updateZZoneUI();
  // showWinAnimation() で disabled になるので遅延して再有効化
  setTimeout(() => {
    document.getElementById('btn-lever').disabled = false;
  }, 600);
}

function updateZCoinsDisplay() {
  const spent = 5 - gameState.zZoneCoins;
  for (let i = 0; i < 5; i++) {
    const el = document.getElementById('z-coin-' + i);
    if (el) el.classList.toggle('spent', i >= (5 - spent));
  }
}

function updateZZoneUI() {
  const chainEl = document.getElementById('z-chain-line');
  if (chainEl) {
    chainEl.textContent = gameState.zZoneChain > 0
      ? '黄7連続：' + gameState.zZoneChain + '回'
      : '';
  }
  const setsEl = document.getElementById('z-sets-disp');
  if (setsEl) setsEl.textContent = gameState.totalSets;
}

function processZZoneGame() {
  // 新しいアテンプト開始時（参加料 1枚消費）
  if (gameState.zZoneChain === 0) {
    gameState.zZoneCoins--;
    updateZCoinsDisplay();
  }

  const role = rollZZoneRole();
  renderZZoneRole(role);

  if (Z_YELLOW7_CONFIRMED.has(role.key)) {
    // 確定役 → セット加算 + Zゲーム突入
    gameState.totalSets++;
    gameState.setFromZZone++;

    if (role.key === 'red7_suroe') gameState.bonusCoins += 1400;
    if (role.key === 'god_suroe')  gameState.bonusCoins += 3000;

    if (role.key === 'sp_role') {
      // SP役: 特殊抽選1回
      const won = Math.random() < 0.80;
      if (won) { gameState.totalSets++; gameState.setFromLottery++; }
    }

    updateZZoneUI();
    enterZGame();
    return;
  }

  if (Z_YELLOW7_NORMAL.has(role.key)) {
    // 通常黄7 → チェーン加算
    gameState.zZoneChain++;
    gameState.zZoneHadYellow7 = true;
    updateZZoneUI();

    if (gameState.zZoneChain >= 5) {
      // 成功A（5連続）→ セット+1 → Zゲーム
      gameState.totalSets++;
      gameState.setFromZZone++;
      enterZGame();
    }
    return;
  }

  // 黄7以外 → チェーンリセット
  gameState.zZoneChain = 0;
  updateZZoneUI();

  if (gameState.zZoneCoins <= 0) {
    if (gameState.zZoneHadYellow7) {
      // 失敗B（黄7あり、コイン切れ）→ リザルト
      showResultScreen();
    } else {
      // 失敗A（黄7なし、コイン切れ）→ 特殊抽選
      doSpecialLottery();
    }
  }
}

function doSpecialLottery() {
  let gained = 0;
  let log    = [];
  // ループ抽選（80%継続）
  let round  = 1;
  while (true) {
    const won = Math.random() < 0.80;
    if (won) {
      gained++;
      gameState.totalSets++;
      gameState.setFromLottery++;
      log.push(round + '回目：当選 ✓');
    } else {
      log.push(round + '回目：終了');
      break;
    }
    round++;
  }

  // ログ表示
  document.getElementById('z-lottery-box').style.display = '';
  document.getElementById('z-lottery-log').innerHTML =
    '<strong style="color:var(--gold)">特殊抽選（80%ループ）</strong><br>' +
    log.join('<br>') + '<br>セット獲得：+' + gained;
  updateZZoneUI();

  // 入力を受け付けないようにし、少し待ってリザルトへ
  gameState.phase = 'result';
  document.getElementById('btn-lever').disabled = true;
  setTimeout(() => showResultScreen(), 1800);
}

function enterZGame() {
  gameState.phase        = 'Z-GAME';
  gameState.zGameReached = true;
  gameState.zGameChain   = 0;
  document.body.classList.add('z-game-active');
  document.getElementById('btn-lever').disabled = true;

  // カットシーン表示
  triggerOverlay('flash-zgame');
  const cutscene = document.getElementById('zgame-cutscene');
  cutscene.classList.remove('fade-out');
  cutscene.classList.add('visible');

  // 1秒後にフェードアウト → パネル切り替え → レバー再有効
  setTimeout(() => {
    cutscene.classList.add('fade-out');
    setTimeout(() => cutscene.classList.remove('visible', 'fade-out'), 300);

    document.getElementById('z-zone-panel').style.display = 'none';
    document.getElementById('z-game-panel').style.display = '';
    document.getElementById('result-panel').style.display = 'none';
    updateZGameUI(null);
    document.getElementById('btn-lever').disabled = false;
  }, 1000);
}

function updateZGameUI(lastRoleLabel) {
  document.getElementById('z-game-big').textContent   = gameState.totalSets;
  document.getElementById('z-game-streak').textContent =
    gameState.zGameChain > 0
      ? '黄7連続 ' + gameState.zGameChain + '回'
      : (lastRoleLabel ? lastRoleLabel + ' を引きました' : '');
}

function processZGameGame() {
  const role = rollZZoneRole();
  renderZZoneRole(role);

  const isYellow7 = Z_YELLOW7_NORMAL.has(role.key) || Z_YELLOW7_CONFIRMED.has(role.key);

  if (isYellow7) {
    gameState.zGameChain++;
    gameState.totalSets++;
    gameState.setFromZGame++;

    if (role.key === 'red7_suroe') gameState.bonusCoins += 1400;
    if (role.key === 'god_suroe')  gameState.bonusCoins += 3000;

    if (role.key === 'sp_role') {
      const won = Math.random() < 0.80;
      if (won) { gameState.totalSets++; gameState.setFromLottery++; }
    }

    updateZGameUI(null);
  } else {
    // 黄7以外 → Zゲーム終了 → リザルト
    gameState.zGameChain = 0;
    gameState.phase = 'result';
    document.getElementById('btn-lever').disabled = true;
    updateZGameUI(role.label);
    setTimeout(() => showResultScreen(), 900);
  }
}

function showGGResultScreen() {
  gameState.phase = 'result';
  document.getElementById('result-panel').style.display = '';
  document.getElementById('btn-lever').disabled = true;

  const digits  = gameState.ggDigits ? gameState.ggDigits.join('') : '—';
  const trigger = gameState.ggTrigger ?? '—';
  const bonus   = gameState.bonusCoins ?? 0;
  const sets    = 1;
  const base    = sets * 350;
  const coins   = base + bonus;

  let rows =
    '<div class="result-row"><span class="rl">経過G数</span><span class="rv">' + gameState.totalGames + ' G</span></div>' +
    '<div class="result-row"><span class="rl">当選契機</span><span class="rv" style="font-size:12px">' + trigger + '</span></div>' +
    '<div class="result-row"><span class="rl">出目</span><span class="rv" style="color:var(--red);font-size:20px;letter-spacing:4px">' + digits + '</span></div>' +
    '<div class="result-row"><span class="rl">獲得セット数</span><span class="rv">' + sets + ' セット（' + base + '枚）</span></div>';
  if (bonus > 0) {
    const bonusLabel = bonus === 3000 ? 'GOD揃いボーナス' : '赤7揃いボーナス';
    rows += '<div class="result-row"><span class="rl">' + bonusLabel + '</span><span class="rv" style="color:var(--orange)">+' + bonus + ' 枚</span></div>';
  }
  document.getElementById('result-rows').innerHTML = rows;

  document.getElementById('result-total').textContent = coins;
  document.getElementById('result-bns').textContent   = bonus > 0 ? '特殊役ボーナス込み' : '';
  document.getElementById('result-detail').innerHTML  =
    'GG当選：' + sets + 'セット × 350枚' + (bonus > 0 ? ' + ボーナス ' + bonus + '枚' : '') + ' = ' + coins + '枚';

  // result-sumのラベルを通常に戻す
  const sumLabel = document.querySelector('#result-panel .result-sum div:first-child');
  if (sumLabel) sumLabel.textContent = '合計獲得枚数';
  const sumUnit = document.querySelector('#result-panel .result-sum-unit');
  if (sumUnit) sumUnit.textContent = '枚';

  saveRanking(coins).then(() => fetchAndRenderRanking());
}

function showResultScreen() {
  const totalCoins = gameState.totalSets * 350 + gameState.bonusCoins;
  // Z-ZONE 終了時に履歴記録（セット数・枚数が確定してから）
  pushHistory('zzone', {
    sets:  gameState.totalSets,
    coins: totalCoins,
    zGame: gameState.zGameReached,
  });

  gameState.phase = 'result';
  clearZMode();
  document.getElementById('z-zone-panel').style.display = 'none';
  document.getElementById('z-game-panel').style.display = 'none';
  document.getElementById('result-panel').style.display = '';
  document.getElementById('btn-lever').disabled = true;
  // ラベルを Z-ZONE 用に初期化（GG result で書き換えられた場合も戻す）
  const sumLabel = document.querySelector('#result-panel .result-sum div:first-child');
  if (sumLabel) sumLabel.textContent = '合計獲得枚数';
  const sumUnit = document.querySelector('#result-panel .result-sum-unit');
  if (sumUnit) sumUnit.textContent = '枚';

  const sets       = gameState.totalSets;
  const setsCoins  = sets * 350;
  const bonus      = gameState.bonusCoins;
  const total      = setsCoins + bonus;

  // 内訳行
  const rows = [
    { l: '突入セット',            v: gameState.setFromEntry   + ' セット' },
    { l: 'Zゾーン成功セット',      v: gameState.setFromZZone   + ' セット' },
    { l: 'Zゲーム継続セット',      v: gameState.setFromZGame   + ' セット' },
    { l: '特殊抽選セット',         v: gameState.setFromLottery + ' セット' },
    { l: '合計セット数',           v: sets + ' セット' },
    { l: '1セット = 350枚',        v: setsCoins + ' 枚' },
  ];

  document.getElementById('result-rows').innerHTML =
    rows.map(r =>
      '<div class="result-row"><span class="rl">' + r.l + '</span><span class="rv">' + r.v + '</span></div>'
    ).join('');

  document.getElementById('result-total').textContent = total;

  document.getElementById('result-bns').textContent =
    bonus > 0 ? 'ボーナス枚数: ' + bonus + ' 枚（特殊役）' : '';

  document.getElementById('result-detail').innerHTML =
    'セット数詳細：突入+' + gameState.setFromEntry +
    ' / Zゾーン+' + gameState.setFromZZone +
    ' / Zゲーム+' + gameState.setFromZGame +
    ' / 特殊抽選+' + gameState.setFromLottery +
    '<br>経過G数：' + gameState.totalGames + 'G';

  saveRanking(total).then(() => fetchAndRenderRanking());
}

function renderZZoneRole(role) {
  // リールを消して剣を大きく黄色で表示
  const reelArea = document.getElementById('reel-area');
  reelArea.classList.add('z-mode');
  document.getElementById('sword-icon').classList.add('visible');

  const labelEl = document.getElementById('role-label');
  const rateEl  = document.getElementById('role-rate');
  if (labelEl) labelEl.textContent = role.label;
  if (rateEl)  rateEl.textContent  = '1/' + (1 / role.weight).toFixed(1);
}

function clearZMode() {
  document.getElementById('reel-area').classList.remove('z-mode');
  document.body.classList.remove('z-active', 'z-game-active');
}

// ========== UI RENDERING ==========

function digitClass(digit, mode, isTenpaDigit) {
  if (mode === 'win') {
    if (digit === '7') return 's-seven';
    if (digit === '0') return 's-zero';
    return 's-odd';
  }
  if (mode === 'tenpa') return isTenpaDigit ? 's-tenpa' : 's-even';
  if (digit === 'V') return 's-v';
  if (digit === '7') return 's-hot';
  if (['0','1','3','5'].includes(digit)) return 's-odd';
  return 's-even';
}

function renderReels(digits, mode, tenpaDigit) {
  const reelArea  = document.getElementById('reel-area');
  const godLabels = document.getElementById('god-labels');
  const swordIcon = document.getElementById('sword-icon');
  const msgEl     = document.getElementById('reel-message');

  const isZeroWin  = mode === 'win' && digits[0] === '0';
  const isSevenWin = mode === 'win' && digits[0] === '7';

  swordIcon.classList.toggle('visible', isZeroWin);
  godLabels.classList.toggle('visible', isSevenWin);
  reelArea.classList.remove('s-pinch');

  for (let i = 0; i < 3; i++) {
    const reelEl = document.getElementById('reel-' + i);
    const span   = reelEl.querySelector('.reel-digit');
    reelEl.className = 'reel';
    const isTenpa = (mode === 'tenpa') && (digits[i] === tenpaDigit);
    reelEl.classList.add(digitClass(digits[i], mode, isTenpa));
    span.textContent = digits[i];
  }

  msgEl.removeAttribute('style');
  if (mode === 'win') {
    if (isSevenWin) {
      msgEl.textContent = '★ GOD GAME ★';
      msgEl.style.background = 'linear-gradient(90deg,#ff8800,#ffff00,#00ff88)';
      msgEl.style.webkitBackgroundClip = 'text';
      msgEl.style.webkitTextFillColor  = 'transparent';
    } else if (isZeroWin) {
      const trig = gameState.ggTrigger
        ? '<br><span style="font-size:10px;font-weight:normal;opacity:0.75;">' + gameState.ggTrigger + '</span>'
        : '';
      msgEl.innerHTML  = '— Zゾーン突入 —' + trig;
      msgEl.style.color = '#cc0000';
    } else {
      const trig = gameState.ggTrigger
        ? '<br><span style="font-size:10px;font-weight:normal;opacity:0.75;">' + gameState.ggTrigger + '</span>'
        : '';
      msgEl.innerHTML   = '★ GG当選！ ★' + trig;
      msgEl.style.color = '#ff8800';
    }
  } else if (mode === 'tenpa') {
    msgEl.textContent = '前兆中…';
    msgEl.style.color = '#ff8800';
  } else {
    msgEl.textContent = '';
  }
}

function renderRole(roleKey) {
  const labelEl = document.getElementById('role-label');
  const rateEl  = document.getElementById('role-rate');

  if (!roleKey) {
    labelEl.textContent = '前兆中…';
    rateEl.textContent  = '';
    return;
  }

  const row = ROLE_TABLE.find(r => r.key === roleKey);

  // 成立確率を分数で表示（den フィールドの値をそのまま使用）
  const fracStr = (() => {
    if (!row || row.den == null) return '';
    const n = row.den;
    return '1/' + (Number.isInteger(n) ? n.toLocaleString() : n);
  })();

  // 色設定をリセット
  labelEl.style.cssText = '';

  const RARE_RED  = new Set(['replay_mid','yellow7_up','yellow7_mid']);
  const CONFIRMED = new Set(['god_suroe','red7_suroe','sp_role']);
  if (RARE_RED.has(roleKey)) {
    labelEl.style.color = 'var(--red)';
  } else if (CONFIRMED.has(roleKey)) {
    labelEl.style.background         = 'linear-gradient(90deg,#ff8800,#ffff00,#00ff88,#0088ff,#ff0088)';
    labelEl.style.webkitBackgroundClip = 'text';
    labelEl.style.webkitTextFillColor  = 'transparent';
  }

  const fracSpan = fracStr
    ? '<span style="font-size:10px;font-weight:normal;opacity:0.65;margin-left:6px;">' + fracStr + '</span>'
    : '';
  labelEl.innerHTML = (row ? row.label : '—') + fracSpan;

  const pct    = v => (v * 100).toFixed(1) + '%';
  const single = GG_SINGLE_TABLE[roleKey] ?? 0;
  rateEl.textContent = '当選率：' + pct(single);
}

function updateCounters() {
  const pct = v => (v * 100).toFixed(1) + '%';

  document.getElementById('cnt-total').textContent   = gameState.totalGames;
  document.getElementById('cnt-replay').textContent  = gameState.replayChain;
  document.getElementById('cnt-yellow7').textContent = gameState.yellow7Chain;

  // 保証G数
  const gEl  = document.getElementById('cnt-guarantee');
  const gSub = document.getElementById('cnt-guarantee-sub');
  gEl.textContent = gameState.guaranteeGames;
  gEl.className   = 'counter-value guarantee' + (gameState.guaranteeGames <= 3 ? ' low' : '');
  if (gameState.guaranteeAddPct) {
    gSub.textContent = '加算！' + gameState.guaranteeAddPct;
    gSub.style.color = 'var(--orange)';
  } else if (gameState.guaranteeGames <= 3) {
    gSub.textContent = '加算抽選中';
    gSub.style.color = 'var(--dim)';
  } else {
    gSub.textContent = '';
  }

  // リプレイ連続・黄7連続 に履歴抽選率＋N連続確率を表示
  const chainPctStr = v => {
    const p = v * 100;
    return p >= 1 ? p.toFixed(1) + '%' : p >= 0.01 ? p.toFixed(2) + '%' : p.toFixed(3) + '%';
  };
  const rSub = document.getElementById('cnt-replay-sub');
  const ySub = document.getElementById('cnt-yellow7-sub');
  if (gameState.replayChain > 0) {
    const chain = gameState.replayChain;
    const idx   = Math.min(chain, REPLAY_CHAIN_RATE.length - 1);
    let html = '履歴抽選：' + pct(REPLAY_CHAIN_RATE[idx]);
    if (chain >= 2) html += '<br>' + chain + '連続確率：' + chainPctStr(REPLAY_CHAIN_P(chain));
    rSub.innerHTML   = html;
    rSub.style.color = 'var(--dim)';
  } else {
    rSub.innerHTML = '';
  }
  if (gameState.yellow7Chain > 0) {
    const chain = gameState.yellow7Chain;
    const idx   = Math.min(chain, YELLOW7_CHAIN_RATE.length - 1);
    let html = '履歴抽選：' + pct(YELLOW7_CHAIN_RATE[idx]);
    if (chain >= 2) html += '<br>' + chain + '連続確率：' + chainPctStr(YELLOW7_CHAIN_P(chain));
    ySub.innerHTML   = html;
    ySub.style.color = 'var(--dim)';
  } else {
    ySub.innerHTML = '';
  }
}

// ========== ANIMATIONS + HANDLERS + INIT ==========

function animateReels(animClass) {
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('reel-' + i);
    el.classList.remove('anim-drop', 'anim-pop');
    void el.offsetWidth;
    el.classList.add(animClass);
  }
}

function triggerOverlay(cls) {
  const ov = document.getElementById('overlay');
  ov.className = 'overlay';
  void ov.offsetWidth;
  ov.className = 'overlay ' + cls;
}

function showWinAnimation() {
  animateReels('anim-drop');
  triggerOverlay('flash-red');
  document.getElementById('btn-lever').disabled = true;
}

function showChokkouAnim() {
  animateReels('anim-pop');
}

function showFakeRecovery() {
  gameState.pendingFakeFall = false;
  gameState.totalGames++;
  gameState.guaranteeAddPct = null;

  const role   = rollRole();
  updateChains(role.key);
  const isRare = ['yellow7_up','yellow7_mid','fake_replay','sp_role','red7_suroe'].includes(role.key);

  const chainResult = rollGGChain();
  const bDigits     = generateBarakeme(isRare ? 'hot' : 'normal');
  renderReels(bDigits, 'normal');
  document.getElementById('reel-area').classList.remove('s-pinch');
  const msgEl = document.getElementById('reel-message');
  msgEl.textContent = '転落回避！';
  msgEl.style.color = '#4da6ff';
  renderRole(role.key);
  updateCounters();

  if (chainResult) {
    const ggResult = decideGGNumber(role.key);
    gameState.ggDigits       = ggResult.digits;
    gameState.ggWins         = 1;
    gameState.ggTrigger      = buildGGTrigger(role.key, false, chainResult);
    gameState.phase          = 'chokkou';
    gameState.chokkouCount   = 0;
    gameState.chokkouTarget  = ggResult.digits[0];
    gameState.chokkouRoleKey = role.key;
    return;
  }

  if (gameState.guaranteeGames === 0) {
    if (rollFall(role.key)) {
      gameState.pendingFall = true;
      showFallPinch();
    } else if (Math.random() < 0.05) {
      gameState.pendingFakeFall = true;
      showFallPinch();
    }
  }
}

function showFallPinch() {
  document.getElementById('reel-area').classList.add('s-pinch');
  const msgEl = document.getElementById('reel-message');
  msgEl.textContent  = '⚠ 転落のピンチ！';
  msgEl.style.color  = 'var(--orange)';
  triggerOverlay('flash-orange');
}

function showFallEnd() {
  document.getElementById('end-sub').textContent =
    gameState.totalGames + 'G でガイアステージ終了';
  document.getElementById('end-overlay').classList.add('visible');
  document.getElementById('btn-lever').disabled = true;
}

document.getElementById('btn-lever').addEventListener('click', () => {
  processGame();
});

document.getElementById('btn-back').addEventListener('click', () => {
  document.getElementById('btn-reset').click();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  resetGameState();
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('reel-' + i);
    el.className = 'reel';
    el.querySelector('.reel-digit').textContent = '—';
  }
  document.getElementById('reel-area').classList.remove('s-pinch', 'z-mode');
  document.getElementById('god-labels').classList.remove('visible');
  document.getElementById('sword-icon').classList.remove('visible');
  document.body.classList.remove('z-active', 'z-game-active');
  const msgEl = document.getElementById('reel-message');
  msgEl.textContent = '';
  msgEl.removeAttribute('style');
  document.getElementById('role-label').textContent = '— 待機中 —';
  document.getElementById('role-rate').textContent  = '';
  document.getElementById('end-overlay').classList.remove('visible');
  document.getElementById('z-zone-panel').style.display = 'none';
  document.getElementById('z-game-panel').style.display = 'none';
  document.getElementById('result-panel').style.display = 'none';
  // コイン表示リセット
  for (let i = 0; i < 5; i++) {
    const c = document.getElementById('z-coin-' + i);
    if (c) c.classList.remove('spent');
  }
  document.getElementById('btn-lever').disabled = false;
  updateCounters();
});

updateCounters();
fetchAndRenderRanking();
</script>
</body>
</html>
