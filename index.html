<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ミリオンゴッド シミュレーター</title>
<style>
:root {
  --bg: #1c1c2e;
  --card: #252540;
  --card2: #1e1e30;
  --red: #ff3355;
  --yellow: #ccaa00;
  --orange: #ff8800;
  --gold: #ffd700;
  --text: #ffffff;
  --dim: #6c757d;
  --border: #333355;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px 12px;
}
#app { width: 100%; max-width: 390px; }
.game-title { text-align: center; padding: 8px; margin-bottom: 12px; }
.game-title h1 { font-size: 20px; font-weight: 900; letter-spacing: 5px; }
.game-title .sub { font-size: 10px; color: var(--dim); letter-spacing: 3px; margin-top: 2px; }
.reel-area { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
.sword-icon {
  text-align: center; height: 0; overflow: hidden; opacity: 0;
  transition: height 0.3s, opacity 0.3s; margin-bottom: 0;
}
.sword-icon.visible { height: 40px; opacity: 1; margin-bottom: 6px; }
.reels { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
.reel {
  background: var(--card2); border-radius: 10px; width: 88px; height: 96px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--border); transition: border-color 0.2s, background 0.2s;
}
.reel-digit { font-size: 58px; font-weight: 900; line-height: 1; color: var(--dim); }
.reel.s-odd { border-color: var(--red); background: #2a1020; }
.reel.s-odd .reel-digit { color: var(--red); text-shadow: 0 0 18px var(--red); }
.reel.s-even { border-color: #4a4a6a; }
.reel.s-even .reel-digit { color: var(--yellow); }
.reel.s-zero { border-color: #aa0000; background: #200000; }
.reel.s-zero .reel-digit { color: #cc0000; text-shadow: 0 0 14px #cc0000; }
.reel.s-seven { border-color: #9900cc; background: #08001a; }
.reel.s-seven .reel-digit {
  background: linear-gradient(180deg,#ff8800,#ffff00,#00ff88,#0088ff,#ff0088);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 8px #ff0088);
}
.reel.s-v .reel-digit { color: var(--red); font-style: italic; }
.reel.s-tenpa { border-color: var(--orange); }
.reel.s-tenpa .reel-digit,
.reel.s-hot .reel-digit { color: var(--orange); text-shadow: 0 0 12px var(--orange); }
.reel-area.s-pinch { border: 2px solid var(--orange); box-shadow: 0 0 20px rgba(255,136,0,0.3); }
.god-labels {
  display: flex; justify-content: space-around;
  margin-top: 2px; height: 0; overflow: hidden; opacity: 0;
  transition: height 0.3s, opacity 0.3s;
}
.god-labels.visible { height: 20px; opacity: 1; }
.god-label { font-size: 13px; font-weight: 900; }
.reel-message {
  text-align: center; font-size: 12px; font-weight: bold;
  letter-spacing: 1px; min-height: 20px; margin-top: 8px; color: var(--dim);
}
.role-display {
  background: var(--card); border-radius: 8px; padding: 8px 12px;
  text-align: center; font-size: 13px; color: #aaa; margin-bottom: 10px;
}
.counters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.counter { background: var(--card); border-radius: 10px; padding: 10px 8px; text-align: center; }
.counter-label { font-size: 10px; color: var(--dim); margin-bottom: 4px; }
.counter-value { font-size: 24px; font-weight: bold; }
.counter-value.guarantee { color: var(--orange); }
.counter-value.guarantee.low { color: var(--red); }
.counter-value.replay { color: #4da6ff; }
.counter-value.yellow7 { color: var(--gold); }
.btn-lever {
  width: 100%; background: var(--red); border: none; border-radius: 12px;
  padding: 16px; color: #fff; font-size: 16px; font-weight: 900; cursor: pointer;
  margin-bottom: 8px; transition: opacity 0.15s, transform 0.1s;
}
.btn-lever:active { transform: scale(0.98); }
.btn-lever:disabled { background: #444; color: #666; cursor: not-allowed; }
.btn-reset {
  width: 100%; background: transparent; border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; color: var(--dim); font-size: 12px; cursor: pointer;
}
.btn-reset:hover { border-color: #666; color: #aaa; }
@keyframes reelDrop {
  0%   { transform: translateY(-24px); opacity: 0; }
  65%  { transform: translateY(4px); }
  100% { transform: translateY(0); opacity: 1; }
}
@keyframes reelPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}
@keyframes flashRed    { 0% { background: rgba(255,51,85,0.55); } 100% { background: transparent; } }
@keyframes flashOrange { 0% { background: rgba(255,136,0,0.45); } 100% { background: transparent; } }
.reel.anim-drop { animation: reelDrop 0.35s ease-out; }
.reel.anim-pop  { animation: reelPop  0.3s ease-out; }
.overlay { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
.overlay.flash-red    { animation: flashRed    0.5s ease-out forwards; }
.overlay.flash-orange { animation: flashOrange 0.4s ease-out forwards; }
.end-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; pointer-events: none; transition: background 0.6s;
}
.end-overlay.visible { background: rgba(0,0,0,0.88); pointer-events: all; }
.end-overlay .end-text {
  font-size: 32px; font-weight: 900; color: var(--dim); letter-spacing: 5px;
  opacity: 0; transition: opacity 0.4s 0.3s;
}
.end-overlay.visible .end-text { opacity: 1; }
.end-overlay .end-sub {
  font-size: 13px; color: #555; margin-top: 10px;
  opacity: 0; transition: opacity 0.4s 0.5s;
}
.end-overlay.visible .end-sub { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div class="game-title">
    <h1>MILLION GOD</h1>
    <div class="sub">GAIA STAGE</div>
  </div>

  <div class="reel-area" id="reel-area">
    <div class="sword-icon" id="sword-icon">
      <svg width="28" height="34" viewBox="0 0 28 34" fill="none">
        <line x1="14" y1="1"  x2="14" y2="28" stroke="#cc0000" stroke-width="3"   stroke-linecap="round"/>
        <line x1="7"  y1="9"  x2="21" y2="9"  stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="9"  y1="13" x2="19" y2="13" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>
        <polygon points="14,33 10.5,26 17.5,26" fill="#cc0000"/>
      </svg>
    </div>

    <div class="reels">
      <div class="reel" id="reel-0"><span class="reel-digit">—</span></div>
      <div class="reel" id="reel-1"><span class="reel-digit">—</span></div>
      <div class="reel" id="reel-2"><span class="reel-digit">—</span></div>
    </div>

    <div class="god-labels" id="god-labels">
      <span class="god-label" style="background:linear-gradient(90deg,#ff8800,#ffff00);-webkit-background-clip:text;-webkit-text-fill-color:transparent">GOD</span>
      <span class="god-label" style="background:linear-gradient(90deg,#ffff00,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent">GOD</span>
      <span class="god-label" style="background:linear-gradient(90deg,#00ff88,#0088ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">GOD</span>
    </div>

    <div class="reel-message" id="reel-message"></div>
  </div>

  <div class="role-display" id="role-display">— 待機中 —</div>

  <div class="counters">
    <div class="counter">
      <div class="counter-label">経過G数</div>
      <div class="counter-value" id="cnt-total">0</div>
    </div>
    <div class="counter">
      <div class="counter-label">保証G数</div>
      <div class="counter-value guarantee" id="cnt-guarantee">9</div>
    </div>
    <div class="counter">
      <div class="counter-label">リプレイ連続</div>
      <div class="counter-value replay" id="cnt-replay">0</div>
    </div>
    <div class="counter">
      <div class="counter-label">黄7連続</div>
      <div class="counter-value yellow7" id="cnt-yellow7">0</div>
    </div>
  </div>

  <button class="btn-lever" id="btn-lever">レバーを叩く</button>
  <button class="btn-reset"  id="btn-reset">リセット</button>
</div>

<div class="overlay" id="overlay"></div>
<div class="end-overlay" id="end-overlay">
  <div class="end-text">STAGE END</div>
  <div class="end-sub" id="end-sub">ガイアステージ終了</div>
</div>

<script>
// ========== CONSTANTS ==========
const ROLE_TABLE = [
  { key: 'hazure',         label: 'ハズレ',           weight: 18.7384 },
  { key: 'replay_top',     label: '上段リプレイ',       weight: 12.6582 },
  { key: 'yellow7_bottom', label: '下段黄7',           weight:  5.4348 },
  { key: 'gaia_bell',      label: 'ガイアベル',         weight:  2.6596 },
  { key: 'replay_mid',     label: '中段リプレイ',       weight:  0.9158 },
  { key: 'yellow7_up',     label: '右上がり黄7',        weight:  0.5371 },
  { key: 'fake_replay',    label: '赤7フェイクリプレイ', weight:  0.1068 },
  { key: 'yellow7_mid',    label: '中段黄7',           weight:  0.1038 },
  { key: 'red7_suroe',     label: '赤7揃い',           weight:  0.0145 },
  { key: 'god_suroe',      label: 'GOD揃い',           weight:  0.0061 },
  { key: 'sp_role',        label: 'SP役',              weight:  0.0015 },
];
const ROLE_TOTAL_WEIGHT = ROLE_TABLE.reduce((s, r) => s + r.weight, 0);

const GG_SINGLE_TABLE = {
  hazure:         0.016,
  replay_top:     0.016,
  gaia_bell:      0.016,
  yellow7_bottom: 0.016,
  fake_replay:    0.016,
  replay_mid:     0.50,
  yellow7_up:     0.625,
  yellow7_mid:    1.0,
  red7_suroe:     1.0,
  god_suroe:      1.0,
  sp_role:        1.0,
};

const REPLAY_CHAIN_RATE  = [0, 0.059, 0.059, 0.25, 0.75, 1.0];
const YELLOW7_CHAIN_RATE = [0, 0.012, 0.012, 0.102, 0.50, 1.0];

const GUARANTEE_ADD_TABLE = {
  hazure:         0.053,
  replay_top:     0.053,
  gaia_bell:      0.053,
  yellow7_bottom: 0.053,
  fake_replay:    0.053,
  replay_mid:     1.0,
  yellow7_up:     1.0,
};

const FALL_RATE = { hazure: 0.129 };

const FORBIDDEN_BARAKEME = new Set([
  '135','315','468','526','354','448','664',
  '012','026','032','038','046','04V','075',
  '104','110','123','168','175','184',
  '201','223','280','283',
  '324','344',
  '415','428',
  '514',
  '634','681',
  '801','808','821','841','845','850','873','884',
]);

const Z_ZONE_CONFIG = {
  maxGames:     null,
  successCount: 5,
};

// ========== GAME STATE ==========
let gameState = {
  totalGames:     0,
  guaranteeGames: 9,
  replayChain:    0,
  yellow7Chain:   0,
  phase:          'gaia',
  chokkouCount:   0,
  chokkouTarget:  null,
  ggDigits:       null,
  pendingFall:    false,
};

function resetGameState() {
  gameState = {
    totalGames: 0, guaranteeGames: 9,
    replayChain: 0, yellow7Chain: 0,
    phase: 'gaia', chokkouCount: 0,
    chokkouTarget: null, ggDigits: null,
    pendingFall: false,
  };
}

function rollRole() {
  return weightedPick(ROLE_TABLE, ROLE_TOTAL_WEIGHT);
}

function updateChains(roleKey) {
  const replaySet  = new Set(['replay_top','replay_mid','fake_replay']);
  const yellow7Set = new Set(['yellow7_bottom','yellow7_up','yellow7_mid']);
  if (replaySet.has(roleKey)) {
    gameState.replayChain++;
    gameState.yellow7Chain = 0;
  } else if (yellow7Set.has(roleKey)) {
    gameState.yellow7Chain++;
    gameState.replayChain = 0;
  } else if (roleKey === 'gaia_bell') {
    // ガイアベル: 連続カウントを途切れさせない
  } else {
    gameState.replayChain  = 0;
    gameState.yellow7Chain = 0;
  }
}

// ========== UTILITY + バラケ目 ==========

function weightedPick(table, totalWeight) {
  const r = Math.random() * totalWeight;
  let cum = 0;
  for (const row of table) {
    cum += row.weight;
    if (r < cum) return row;
  }
  return table[table.length - 1];
}

function generateBarakeme(mode) {
  const BASE = ['0','1','2','3','4','5','6','8'];
  let result = null;
  for (let tries = 0; tries < 500 && !result; tries++) {
    const d = [
      BASE[Math.floor(Math.random() * BASE.length)],
      BASE[Math.floor(Math.random() * BASE.length)],
      BASE[Math.floor(Math.random() * BASE.length)],
    ];
    if (mode === 'hot') {
      d[Math.floor(Math.random() * 3)] = Math.random() < 0.5 ? '7' : 'V';
    }
    if (d[0] === d[1] && d[1] === d[2]) continue;
    if (FORBIDDEN_BARAKEME.has(d.join(''))) continue;
    const n = d.map(x => (x === 'V') ? NaN : Number(x));
    if (n[1] - n[0] === 1 && n[2] - n[1] === 1) continue;
    result = d;
  }
  return result || ['8','2','6'];
}

function generateTenpa(targetDigit) {
  const BASE     = ['0','1','2','3','4','5','6','8'];
  const diffPool = BASE.filter(d => d !== targetDigit);
  let result = null;
  for (let tries = 0; tries < 300 && !result; tries++) {
    const diff = diffPool[Math.floor(Math.random() * diffPool.length)];
    const d = [targetDigit, targetDigit, diff];
    if (FORBIDDEN_BARAKEME.has(d.join(''))) continue;
    result = d;
  }
  if (!result) {
    for (const diff of diffPool) {
      if (!FORBIDDEN_BARAKEME.has(targetDigit + targetDigit + diff)) {
        result = [targetDigit, targetDigit, diff];
        break;
      }
    }
    result = result || [targetDigit, targetDigit, diffPool[0]];
  }
  return result;
}

function getChokkouDisplay(chokkouTarget) {
  if (chokkouTarget === '0') {
    if (Math.random() < 0.75) return { tenpa: generateTenpa('0'), target: '0' };
    const odd = ['1','3','5'][Math.floor(Math.random() * 3)];
    return { tenpa: generateTenpa(odd), target: odd };
  } else {
    if (Math.random() < 0.10) return { tenpa: generateTenpa('0'), target: '0' };
    return { tenpa: generateTenpa(chokkouTarget), target: chokkouTarget };
  }
}

// ========== LOTTERY FUNCTIONS ==========

function rollGGSingle(roleKey) {
  return Math.random() < (GG_SINGLE_TABLE[roleKey] ?? 0);
}

function rollGGChain() {
  let won = false;
  if (gameState.replayChain > 0) {
    const idx  = Math.min(gameState.replayChain, REPLAY_CHAIN_RATE.length - 1);
    if (Math.random() < REPLAY_CHAIN_RATE[idx]) won = true;
  }
  if (gameState.yellow7Chain > 0) {
    const idx  = Math.min(gameState.yellow7Chain, YELLOW7_CHAIN_RATE.length - 1);
    if (Math.random() < YELLOW7_CHAIN_RATE[idx]) won = true;
  }
  return won;
}

function rollGuaranteeAdd(roleKey) {
  return Math.random() < (GUARANTEE_ADD_TABLE[roleKey] ?? 0);
}

function rollFall(roleKey) {
  return Math.random() < (FALL_RATE[roleKey] ?? 0);
}

function decideGGNumber(roleKey) {
  if (roleKey === 'god_suroe') {
    return { digits: ['7','7','7'], instant: true };
  }
  if (roleKey === 'red7_suroe') {
    const d = ['1','3','5'][Math.floor(Math.random() * 3)];
    return { digits: [d, d, d], instant: true };
  }
  const d = Math.random() < 0.15
    ? '0'
    : ['1','3','5'][Math.floor(Math.random() * 3)];
  return { digits: [d, d, d], instant: false };
}

// ========== GAME FLOW ==========

function processGame() {
  if (gameState.phase === 'ended') return;

  if (gameState.pendingFall) { endGaiaStage(); return; }

  if (gameState.phase === 'chokkou') { processChokkouGame(); return; }
  if (gameState.phase === 'z_zone')  { processZZoneGame();   return; }

  // ===== GAIA フェーズ =====
  gameState.totalGames++;

  const role = rollRole();
  updateChains(role.key);

  const ggWon = rollGGSingle(role.key) || rollGGChain();

  const isRare = ['yellow7_up','yellow7_mid','fake_replay','sp_role','red7_suroe'].includes(role.key);
  const isInstantRole = (role.key === 'god_suroe' || role.key === 'red7_suroe');

  if (ggWon || isInstantRole) {
    const ggResult = decideGGNumber(role.key);
    gameState.ggDigits = ggResult.digits;

    if (ggResult.instant) {
      gameState.phase = 'gg_won';
      renderReels(ggResult.digits, 'win');
      renderRole(role.key);
      updateCounters();
      showWinAnimation();
    } else {
      gameState.phase        = 'chokkou';
      gameState.chokkouCount = 0;
      gameState.chokkouTarget = ggResult.digits[0];
      const disp = getChokkouDisplay(gameState.chokkouTarget);
      renderReels(disp.tenpa, 'tenpa', disp.target);
      renderRole(role.key);
      updateCounters();
      showChokkouAnim();
    }
    return;
  }

  // ===== GG非当選 =====
  gameState.guaranteeGames = Math.max(0, gameState.guaranteeGames - 1);

  if (gameState.guaranteeGames <= 3 && rollGuaranteeAdd(role.key)) {
    gameState.guaranteeGames += 3;
  }

  const bDigits = generateBarakeme(isRare ? 'hot' : 'normal');
  renderReels(bDigits, 'normal');
  renderRole(role.key);
  updateCounters();

  if (gameState.guaranteeGames === 0 && rollFall(role.key)) {
    gameState.pendingFall = true;
    showFallPinch();
  }
}

function processChokkouGame() {
  gameState.chokkouCount++;
  gameState.totalGames++;

  if (gameState.chokkouCount < 3) {
    const disp = getChokkouDisplay(gameState.chokkouTarget);
    renderReels(disp.tenpa, 'tenpa', disp.target);
    renderRole(null);
    updateCounters();
    showChokkouAnim();
  } else {
    gameState.phase = 'gg_won';
    renderReels(gameState.ggDigits, 'win');
    renderRole(null);
    updateCounters();
    showWinAnimation();
  }
}

function endGaiaStage() {
  gameState.phase = 'ended';
  showFallEnd();
}

// ========== UI RENDERING ==========

function digitClass(digit, mode, isTenpaDigit) {
  if (mode === 'win') {
    if (digit === '7') return 's-seven';
    if (digit === '0') return 's-zero';
    return 's-odd';
  }
  if (mode === 'tenpa') return isTenpaDigit ? 's-tenpa' : 's-even';
  if (digit === 'V') return 's-v';
  if (digit === '7') return 's-hot';
  return 's-even';
}

function renderReels(digits, mode, tenpaDigit) {
  const reelArea  = document.getElementById('reel-area');
  const godLabels = document.getElementById('god-labels');
  const swordIcon = document.getElementById('sword-icon');
  const msgEl     = document.getElementById('reel-message');

  const isZeroWin  = mode === 'win' && digits[0] === '0';
  const isSevenWin = mode === 'win' && digits[0] === '7';

  swordIcon.classList.toggle('visible', isZeroWin);
  godLabels.classList.toggle('visible', isSevenWin);
  reelArea.classList.remove('s-pinch');

  for (let i = 0; i < 3; i++) {
    const reelEl = document.getElementById('reel-' + i);
    const span   = reelEl.querySelector('.reel-digit');
    reelEl.className = 'reel';
    const isTenpa = (mode === 'tenpa') && (digits[i] === tenpaDigit);
    reelEl.classList.add(digitClass(digits[i], mode, isTenpa));
    span.textContent = digits[i];
  }

  msgEl.removeAttribute('style');
  if (mode === 'win') {
    if (isSevenWin) {
      msgEl.textContent = '★ GOD GAME ★';
      msgEl.style.background = 'linear-gradient(90deg,#ff8800,#ffff00,#00ff88)';
      msgEl.style.webkitBackgroundClip = 'text';
      msgEl.style.webkitTextFillColor  = 'transparent';
    } else if (isZeroWin) {
      msgEl.textContent  = '— Zゾーン突入 —';
      msgEl.style.color  = '#cc0000';
    } else {
      msgEl.textContent  = '★ GG当選！ ★';
      msgEl.style.color  = '#ff8800';
    }
  } else if (mode === 'tenpa') {
    msgEl.textContent = '前兆中…';
    msgEl.style.color = '#ff8800';
  } else {
    msgEl.textContent = '';
  }
}

function renderRole(roleKey) {
  const el = document.getElementById('role-display');
  if (!roleKey) { el.textContent = '前兆中…'; return; }
  const row = ROLE_TABLE.find(r => r.key === roleKey);
  el.textContent = row ? row.label : '—';
}

function updateCounters() {
  document.getElementById('cnt-total').textContent    = gameState.totalGames;
  document.getElementById('cnt-replay').textContent   = gameState.replayChain;
  document.getElementById('cnt-yellow7').textContent  = gameState.yellow7Chain;
  const gEl = document.getElementById('cnt-guarantee');
  gEl.textContent  = gameState.guaranteeGames;
  gEl.className    = 'counter-value guarantee' + (gameState.guaranteeGames <= 3 ? ' low' : '');
}

// ========== Z ZONE SKELETON ==========

function enterZZone() {
  gameState.phase = 'z_zone';
}

function processZZoneGame() {
  // TODO: Zゾーン中のゲーム処理
}

// ========== ANIMATIONS + HANDLERS + INIT ==========

function animateReels(animClass) {
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('reel-' + i);
    el.classList.remove('anim-drop', 'anim-pop');
    void el.offsetWidth;
    el.classList.add(animClass);
  }
}

function triggerOverlay(cls) {
  const ov = document.getElementById('overlay');
  ov.className = 'overlay';
  void ov.offsetWidth;
  ov.className = 'overlay ' + cls;
}

function showWinAnimation() {
  animateReels('anim-drop');
  triggerOverlay('flash-red');
  document.getElementById('btn-lever').disabled = true;
}

function showChokkouAnim() {
  animateReels('anim-pop');
}

function showFallPinch() {
  document.getElementById('reel-area').classList.add('s-pinch');
  const msgEl = document.getElementById('reel-message');
  msgEl.textContent  = '⚠ 転落のピンチ！';
  msgEl.style.color  = 'var(--orange)';
  triggerOverlay('flash-orange');
}

function showFallEnd() {
  document.getElementById('end-sub').textContent =
    gameState.totalGames + 'G でガイアステージ終了';
  document.getElementById('end-overlay').classList.add('visible');
  document.getElementById('btn-lever').disabled = true;
}

document.getElementById('btn-lever').addEventListener('click', () => {
  processGame();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  resetGameState();
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('reel-' + i);
    el.className = 'reel';
    el.querySelector('.reel-digit').textContent = '—';
  }
  document.getElementById('reel-area').classList.remove('s-pinch');
  document.getElementById('god-labels').classList.remove('visible');
  document.getElementById('sword-icon').classList.remove('visible');
  const msgEl = document.getElementById('reel-message');
  msgEl.textContent = '';
  msgEl.removeAttribute('style');
  document.getElementById('role-display').textContent = '— 待機中 —';
  document.getElementById('end-overlay').classList.remove('visible');
  document.getElementById('btn-lever').disabled = false;
  updateCounters();
});

updateCounters();
</script>
</body>
</html>
